<!-- MESSAGE UX -->
<div id="message" class="message"></div>

<main class="container">


<!-- RECHERCHE -->
<section class="search-section">

<h2>Rechercher un document</h2>

<form id="search-form">

<label>ID du document</label>
<input type="text" id="docId" required placeholder="Entrez l'ID">


<label>Collection</label>
<select id="collection" required>
<option value="">-- choisir --</option>
<option value="finances">Finances</option>
<option value="ventes">Ventes</option>
</select>


<button type="submit">Rechercher</button>

</form>

</section>



<!-- RESULTAT + FORMULAIRE MODIF -->
<section class="form-section" id="edit-section" style="display:none;">

<h2>Modifier le document</h2>

<form id="edit-form">


<!-- champs dynamiques JS -->


<div id="dynamic-fields"></div>


<button type="submit">Enregistrer modification</button>

</form>

</section>


</main>

<footer class="footer">

</footer>
