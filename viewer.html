<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finances Pro - Analyse</title>

<link rel="stylesheet" href="css/viewer.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- HEADER -->
<header class="header">

<div class="logo">Finances Pro</div>

<nav class="nav">
<a href="index.html">Dashboard</a>
<a href="upload.html">Enregistrer</a>
<a href="modify.html">Modifier</a>
<a href="viewer.html" class="active">Analyse</a>
<a href="download.html">Télécharger</a>
</nav>

</header>


<!-- MESSAGE UX -->
<div id="message" class="message"></div>


<!-- CONTENU -->
<main class="container">


<!-- FILTRE -->
<section class="filter-section">

<h2>Filtrer les données</h2>

<div class="filter-buttons">
<button data-range="3">3 jours</button>
<button data-range="5">5 jours</button>
<button data-range="7">Semaine</button>
<button data-range="30">Mois</button>
</div>

</section>


<!-- STATISTIQUES -->
<section class="stats-grid">

<div class="stat-card">
<h2>Entrées</h2>
<p id="stat-entree">0</p>
</div>

<div class="stat-card">
<h2>Sorties</h2>
<p id="stat-sortie">0</p>
</div>

<div class="stat-card">
<h2>Bénéfice</h2>
<p id="stat-benefice">0</p>
</div>

<div class="stat-card">
<h2>Ventes</h2>
<p id="stat-ventes">0</p>
</div>

<div class="stat-card">
<h2>Stock</h2>
<p id="stat-stock">0</p>
</div>

</section>

<div class="export-section">
    <button id="export-btn">Exporter en CSV</button>
</div>

<!-- GRAPHIQUE -->
<section class="chart-section">

<h2>Évolution</h2>

<canvas id="viewerChart"></canvas>

</section>


<!-- ANALYTICS -->
<section class="analytics">

<h2>Analyse automatique</h2>

<p id="analysis-text">
Chargement de l’analyse...
</p>

</section>


</main>


<!-- FOOTER -->
<footer class="footer">
Finances Pro © 2026
</footer>


<!-- SCRIPTS -->
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/viewer.js"></script>

</body>
  </html>
